services:
  bot:
    build: .
    container_name: code-assistant-bot
    restart: unless-stopped
    env_file: .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import anthropic"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
